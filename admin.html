<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Portfolio Manager</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />

  <!-- Google Fonts & FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Common Variables Style -->
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      background: #020617;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .admin-wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Auth Screen */
    .auth-card {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      max-width: 450px;
      margin: 0 auto;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
    }
    .auth-card h2 {
      font-size: 26px;
      margin-bottom: 24px;
      font-weight: 700;
      color: var(--primary);
    }
    .auth-card form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
    }

    /* Dashboard Interface (hidden by default) */
    .dashboard-container {
      display: none;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 38px;
      backdrop-filter: blur(12px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    .db-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .db-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }
    .logout-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .logout-btn:hover {
      background: #ef4444;
      color: white;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 10px;
    }
    .tab {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }
    .tab.active {
      background: var(--primary);
      color: #020617;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* Actions and Grids */
    .section-action {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .add-btn {
      background: var(--primary);
      color: #020617;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }
    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);
    }

    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .item-card {
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 150px;
    }
    .item-card h4 {
      font-size: 17px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .item-card p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 14px;
      flex: 1;
    }
    .item-actions {
      display: flex;
      gap: 10px;
    }
    .edit-btn, .delete-btn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
      border: none;
    }
    .edit-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
    }
    .edit-btn:hover {
      background: white;
      color: black;
    }
    .delete-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    .delete-btn:hover {
      background: #ef4444;
      color: white;
    }

    /* Modal Form */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.3s;
    }
    .close-modal:hover {
      color: white;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .full-row {
      grid-column: span 2;
    }
    .modal-content form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-content label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .modal-content select {
      background: rgba(2, 6, 23, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: white;
      padding: 10px;
      font-family: inherit;
    }

    /* CV Section Styling */
    .cv-box {
      max-width: 500px;
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 30px;
      margin: 0 auto;
      text-align: center;
    }
    .cv-box i {
      font-size: 40px;
      color: var(--primary);
      margin-bottom: 14px;
    }

    /* Alert messages */
    .alert {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
    }
    .alert.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }
    .alert.success {
      display: block;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: #34d399;
    }
  </style>
</head>
<body>

  <div class="admin-wrapper">

    <!-- 1. LOGIN SCREEN -->
    <div id="auth-screen" class="auth-card">
      <h2>Portfolio Manager</h2>
      <div id="auth-alert" class="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="admin@example.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="submit-btn" style="margin-top: 10px;">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
    </div>

    <!-- 2. DASHBOARD VIEW -->
    <div id="dashboard-view" class="dashboard-container">
      <div class="db-header">
        <h1>Dashboard Panel</h1>
        <button class="logout-btn" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i> Log Out
        </button>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="projects-tab">Projects</button>
        <button class="tab" data-tab="certs-tab">Certifications</button>
        <button class="tab" data-tab="cv-tab">CV/Resume</button>
      </div>

      <div id="db-alert" class="alert"></div>

      <!-- PROJECTS TAB -->
      <div id="projects-tab" class="tab-content active">
        <div class="section-action">
          <h3>Manage Projects</h3>
          <button class="add-btn" onclick="openProjectModal()">
            <i class="fas fa-plus"></i> Add Project
          </button>
        </div>
        <div class="list-grid" id="projects-list-grid">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- CERTIFICATIONS TAB -->
      <div id="certs-tab" class="tab-content">
        <div class="section-action">
          <h3>Manage Certifications</h3>
          <button class="add-btn" onclick="openCertModal()">
            <i class="fas fa-plus"></i> Add Certification
          </button>
        </div>
        <div class="list-grid" id="certs-list-grid">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- CV TAB -->
      <div id="cv-tab" class="tab-content">
        <div class="cv-box">
          <i class="fas fa-file-pdf"></i>
          <h3>Update Resume PDF</h3>
          <p style="margin-bottom: 20px;">Upload a new PDF to overwrite your active CV. Supported formats: .pdf</p>
          
          <form id="cv-upload-form">
            <input type="file" id="cv-file-input" accept=".pdf" required style="display:none;" />
            <button type="button" class="btn btn-outline" onclick="document.getElementById('cv-file-input').click()" style="width:100%; justify-content:center; margin-bottom:14px;">
              <i class="fas fa-cloud-upload-alt"></i> Choose PDF File
            </button>
            <span id="cv-file-name" style="display:block; font-size:12px; color:var(--text-secondary); margin-bottom:14px; font-weight:500;">No file selected</span>
            <button type="submit" class="submit-btn" id="cv-submit-btn" disabled>
              Upload and Update CV
            </button>
          </form>
        </div>
      </div>

    </div>

  </div>

  <!-- 3. PROJECT MODAL -->
  <div class="modal" id="project-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="project-modal-title">Add Project</h3>
        <button class="close-modal" onclick="closeProjectModal()">&times;</button>
      </div>
      <form id="project-form">
        <input type="hidden" id="project-id" />
        <div class="form-grid">
          <div class="form-group full-row">
            <label for="project-title">Project Title</label>
            <input type="text" id="project-title" required placeholder="e.g. Sales Forecast with ML" />
          </div>
          <div class="form-group full-row">
            <label for="project-desc">Description</label>
            <textarea id="project-desc" required placeholder="What does this project do?" style="min-height: 80px;"></textarea>
          </div>
          <div class="form-group">
            <label for="project-badge">Badge (Category)</label>
            <input type="text" id="project-badge" required placeholder="e.g. Dashboard, Machine Learning" />
          </div>
          <div class="form-group">
            <label for="project-tags">Tech Stack (comma-separated)</label>
            <input type="text" id="project-tags" required placeholder="e.g. Python, SQL, Power BI" />
          </div>
          <div class="form-group">
            <label for="project-track">Career Track</label>
            <select id="project-track" style="background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; color: white; padding: 10px; font-family: inherit; font-size: 14px; width: 100%;">
              <option value="data">Data Analytics</option>
              <option value="software">Software & Gen AI</option>
              <option value="both">Both</option>
            </select>
          </div>
          <div class="form-group full-row">
            <label for="project-image">Image URL / Path</label>
            <input type="text" id="project-image" required placeholder="e.g. ./assets/images/ecommerce_sales.jpg" />
          </div>
          <div class="form-group">
            <label for="project-github">GitHub Repository Link</label>
            <input type="url" id="project-github" required placeholder="https://github.com/..." />
          </div>
          <div class="form-group">
            <label for="project-demo">Live Demo / Preview Image Link</label>
            <input type="text" id="project-demo" required placeholder="https://... or image path" />
          </div>
        </div>
        <button type="submit" class="submit-btn" style="margin-top:10px;">Save Project</button>
      </form>
    </div>
  </div>

  <!-- 4. CERTIFICATION MODAL -->
  <div class="modal" id="cert-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="cert-modal-title">Add Certification</h3>
        <button class="close-modal" onclick="closeCertModal()">&times;</button>
      </div>
      <form id="cert-form">
        <input type="hidden" id="cert-id" />
        <div class="form-group">
          <label for="cert-title">Certificate Title</label>
          <input type="text" id="cert-title" required placeholder="e.g. Microsoft Power BI" />
        </div>
        <div class="form-group">
          <label for="cert-issuer">Issuer</label>
          <input type="text" id="cert-issuer" required placeholder="e.g. IBM, Coursera" />
        </div>
        <div class="form-group" style="margin-bottom: 14px;">
          <label for="cert-track">Career Track</label>
          <select id="cert-track" style="background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; color: white; padding: 10px; font-family: inherit; font-size: 14px; width: 100%;">
            <option value="data">Data Analytics</option>
            <option value="software">Software & Gen AI</option>
            <option value="both">Both</option>
          </select>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="cert-icon">Emoji Icon</label>
            <select id="cert-icon">
              <option value="📊">📊 Dashboard</option>
              <option value="🐍">🐍 Python</option>
              <option value="🗄️">🗄️ Database / SQL</option>
              <option value="📈">📈 Marketing / Business</option>
              <option value="🤖">🤖 Machine Learning</option>
              <option value="🌐">🌐 Web Development</option>
            </select>
          </div>
          <div class="form-group">
            <label for="cert-pdf">PDF File / Link</label>
            <input type="text" id="cert-pdf" required placeholder="e.g. ./images/power_bi.pdf" />
          </div>
        </div>
        <button type="submit" class="submit-btn" style="margin-top:10px;">Save Certification</button>
      </form>
    </div>
  </div>

  <!-- Supabase Config & JS SDK -->
  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // Initialize Supabase client
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let projectsCache = [];
    let certsCache = [];

    // Session validation
    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      toggleScreens(session);

      // Add tabs listeners
      document.querySelectorAll(".tab").forEach(tabBtn => {
        tabBtn.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
          
          tabBtn.classList.add("active");
          document.getElementById(tabBtn.dataset.tab).classList.add("active");
        });
      });

      // CV File Input listener
      const fileInput = document.getElementById("cv-file-input");
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          document.getElementById("cv-file-name").textContent = file.name;
          document.getElementById("cv-submit-btn").disabled = false;
        } else {
          document.getElementById("cv-file-name").textContent = "No file selected";
          document.getElementById("cv-submit-btn").disabled = true;
        }
      });
    });

    function toggleScreens(session) {
      const authScreen = document.getElementById("auth-screen");
      const dbView = document.getElementById("dashboard-view");
      
      if (session) {
        authScreen.style.display = "none";
        dbView.style.display = "block";
        loadDashboardData();
      } else {
        authScreen.style.display = "block";
        dbView.style.display = "none";
      }
    }

    // LOGIN ACTION
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      showAlert("auth-alert", "", "clear");
      
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      
      if (error) {
        showAlert("auth-alert", `❌ ${error.message}`, "error");
      } else {
        toggleScreens(data.session);
      }
    });

    // LOGOUT ACTION
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      toggleScreens(null);
    });

    // ALERT HELPER
    function showAlert(elementId, msg, type) {
      const el = document.getElementById(elementId);
      el.className = "alert";
      if (type === "clear") return;
      el.classList.add(type);
      el.textContent = msg;
      if (type === "success") {
        setTimeout(() => el.className = "alert", 4000);
      }
    }

    // FETCHING DATA FOR ADMIN
    async function loadDashboardData() {
      await Promise.all([loadProjects(), loadCertifications()]);
    }

    async function loadProjects() {
      const { data, error } = await supabaseClient.from("projects").select("*").order("created_at", { ascending: true });
      if (error) {
        showAlert("db-alert", "Failed to fetch projects: " + error.message, "error");
        return;
      }
      projectsCache = data;
      renderProjectsGrid();
    }

    async function loadCertifications() {
      const { data, error } = await supabaseClient.from("certifications").select("*").order("created_at", { ascending: true });
      if (error) {
        showAlert("db-alert", "Failed to fetch certifications: " + error.message, "error");
        return;
      }
      certsCache = data;
      renderCertsGrid();
    }

    // RENDERING
    function renderProjectsGrid() {
      const container = document.getElementById("projects-list-grid");
      container.innerHTML = "";
      
      projectsCache.forEach(p => {
        const div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML = `
          <div>
            <h4>${p.title}</h4>
            <p>${p.description}</p>
          </div>
          <div class="item-actions">
            <button class="edit-btn" onclick="openProjectModal(${p.id})">Edit</button>
            <button class="delete-btn" onclick="deleteProject(${p.id})">Delete</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function renderCertsGrid() {
      const container = document.getElementById("certs-list-grid");
      container.innerHTML = "";
      
      certsCache.forEach(c => {
        const div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML = `
          <div>
            <h4>${c.icon} ${c.title}</h4>
            <p>Issuer: ${c.issuer}</p>
          </div>
          <div class="item-actions">
            <button class="edit-btn" onclick="openCertModal(${c.id})">Edit</button>
            <button class="delete-btn" onclick="deleteCert(${c.id})">Delete</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // PROJECT FORMS & MODALS
    function openProjectModal(id = null) {
      const title = document.getElementById("project-modal-title");
      const form = document.getElementById("project-form");
      form.reset();
      document.getElementById("project-id").value = "";

      if (id !== null) {
        title.textContent = "Edit Project";
        const p = projectsCache.find(x => x.id === id);
        if (p) {
          document.getElementById("project-id").value = p.id;
          document.getElementById("project-title").value = p.title;
          document.getElementById("project-desc").value = p.description;
          document.getElementById("project-badge").value = p.badge;
          document.getElementById("project-tags").value = p.tech_stack.join(", ");
          document.getElementById("project-image").value = p.image_url;
          document.getElementById("project-github").value = p.github_url;
          document.getElementById("project-demo").value = p.demo_url;
          document.getElementById("project-track").value = p.category_track || "both";
        }
      } else {
        title.textContent = "Add Project";
      }
      
      document.getElementById("project-modal").classList.add("active");
    }

    function closeProjectModal() {
      document.getElementById("project-modal").classList.remove("active");
    }

    document.getElementById("project-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("project-id").value;
      const title = document.getElementById("project-title").value.trim();
      const description = document.getElementById("project-desc").value.trim();
      const badge = document.getElementById("project-badge").value.trim();
      const tech_stack = document.getElementById("project-tags").value.split(",").map(t => t.trim()).filter(Boolean);
      const image_url = document.getElementById("project-image").value.trim();
      const github_url = document.getElementById("project-github").value.trim();
      const demo_url = document.getElementById("project-demo").value.trim();
      const category_track = document.getElementById("project-track").value;

      const item = { title, description, badge, tech_stack, image_url, github_url, demo_url, category_track };
      
      let res;
      if (id) {
        res = await supabaseClient.from("projects").update(item).eq("id", id);
      } else {
        res = await supabaseClient.from("projects").insert([item]);
      }

      if (res.error) {
        showAlert("db-alert", "Error saving project: " + res.error.message, "error");
      } else {
        showAlert("db-alert", "Project saved successfully!", "success");
        closeProjectModal();
        loadProjects();
      }
    });

    async function deleteProject(id) {
      if (!confirm("Are you sure you want to delete this project?")) return;
      const { error } = await supabaseClient.from("projects").delete().eq("id", id);
      if (error) {
        showAlert("db-alert", "Error deleting project: " + error.message, "error");
      } else {
        showAlert("db-alert", "Project deleted successfully!", "success");
        loadProjects();
      }
    }

    // CERTIFICATIONS FORMS & MODALS
    function openCertModal(id = null) {
      const title = document.getElementById("cert-modal-title");
      const form = document.getElementById("cert-form");
      form.reset();
      document.getElementById("cert-id").value = "";

      if (id !== null) {
        title.textContent = "Edit Certification";
        const c = certsCache.find(x => x.id === id);
        if (c) {
          document.getElementById("cert-id").value = c.id;
          document.getElementById("cert-title").value = c.title;
          document.getElementById("cert-issuer").value = c.issuer;
          document.getElementById("cert-icon").value = c.icon;
          document.getElementById("cert-pdf").value = c.pdf_url;
          document.getElementById("cert-track").value = c.category_track || "both";
        }
      } else {
        title.textContent = "Add Certification";
      }
      
      document.getElementById("cert-modal").classList.add("active");
    }

    function closeCertModal() {
      document.getElementById("cert-modal").classList.remove("active");
    }

    document.getElementById("cert-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("cert-id").value;
      const title = document.getElementById("cert-title").value.trim();
      const issuer = document.getElementById("cert-issuer").value.trim();
      const icon = document.getElementById("cert-icon").value;
      const pdf_url = document.getElementById("cert-pdf").value.trim();
      const category_track = document.getElementById("cert-track").value;

      const item = { title, issuer, icon, pdf_url, category_track };
      
      let res;
      if (id) {
        res = await supabaseClient.from("certifications").update(item).eq("id", id);
      } else {
        res = await supabaseClient.from("certifications").insert([item]);
      }

      if (res.error) {
        showAlert("db-alert", "Error saving certification: " + res.error.message, "error");
      } else {
        showAlert("db-alert", "Certification saved successfully!", "success");
        closeCertModal();
        loadCertifications();
      }
    });

    async function deleteCert(id) {
      if (!confirm("Are you sure you want to delete this certification?")) return;
      const { error } = await supabaseClient.from("certifications").delete().eq("id", id);
      if (error) {
        showAlert("db-alert", "Error deleting certification: " + error.message, "error");
      } else {
        showAlert("db-alert", "Certification deleted successfully!", "success");
        loadCertifications();
      }
    }

    // CV FILE UPLOAD (Supabase Storage)
    document.getElementById("cv-upload-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("cv-submit-btn");
      const fileInput = document.getElementById("cv-file-input");
      const file = fileInput.files[0];
      if (!file) return;

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

      // Upload to resumes storage bucket (we use a fixed name so we can overwrite it easily)
      const fileName = "Mir_Furqaan_Hassan_Resume_.pdf";
      
      // We use upsert: true so it overwrites any existing file
      const { data, error } = await supabaseClient.storage
        .from("resumes")
        .upload(fileName, file, {
          cacheControl: "0",
          upsert: true
        });

      if (error) {
        showAlert("db-alert", "CV Upload failed: " + error.message, "error");
      } else {
        showAlert("db-alert", "CV Uploaded and updated successfully!", "success");
        document.getElementById("cv-upload-form").reset();
        document.getElementById("cv-file-name").textContent = "No file selected";
      }
      btn.disabled = false;
      btn.innerHTML = "Upload and Update CV";
    });
  </script>
</body>
</html>
